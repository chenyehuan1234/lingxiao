        /* --- 全局配置 --- */
        :root {
            --font-main: 'Noto Sans SC', sans-serif;
            --color-primary: #4f46e5;
            --color-secondary: #0ea5e9;
        }
        body {
            font-family: var(--font-main);
            background-color: #FAFAF9;
            color: #1C1917;
            overflow-x: hidden; /* 防止动画溢出 */
        }

        /* --- 滚动条优化 --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #a5b4fc, #6366f1); border-radius: 3px; }

        /* --- 动画工具类 --- */
        .fade-in-section {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: opacity, transform;
        }
        .fade-in-section.is-visible { opacity: 1; transform: none; }

        /* 渐变文字 */
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            background-image: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
        }
        
        /* 成员卡片光效 */
        .member-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            transition: all 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .member-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -5px rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.4);
            background: rgba(255, 255, 255, 0.9);
        }
        .member-avatar-glow {
            position: absolute;
            inset: -4px;
            background: linear-gradient(45deg, #3b82f6, #8b5cf6, #ec4899);
            border-radius: 50%;
            z-index: -1;
            filter: blur(8px);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .member-card:hover .member-avatar-glow { opacity: 0.6; }

        /* AI 悬浮球动画 */
        @keyframes float-pulse {
            0%, 100% { transform: translateY(0) scale(1); box-shadow: 0 10px 30px rgba(79, 70, 229, 0.4); }
            50% { transform: translateY(-5px) scale(1.05); box-shadow: 0 15px 40px rgba(79, 70, 229, 0.6); }
        }
        .ai-fab { animation: float-pulse 4s ease-in-out infinite; }

        /* 图表容器 */
        .chart-container { position: relative; width: 100%; max-width: 600px; margin: auto; height: 300px; }
        @media (min-width: 768px) { .chart-container { height: 350px; } }
        
        /* 时间轴 */
        .timeline-line::before {
            content: ''; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px;
            background: linear-gradient(to bottom, transparent, #cbd5e1 10%, #cbd5e1 90%, transparent);
            transform: translateX(-50%);
        }
    </style>

                <div class="bg-white rounded-[2rem] p-8 md:p-10 text-stone-900 shadow-2xl">
                    <form onsubmit="alert('已收到！');return false;" class="space-y-5">
                        <div class="grid grid-cols-2 gap-5">
                            <input type="text" class="w-full px-5 py-4 rounded-xl bg-stone-50 border border-stone-200 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-bold" placeholder="你的名字" required>
                            <input type="text" class="w-full px-5 py-4 rounded-xl bg-stone-50 border border-stone-200 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-bold" placeholder="联系方式" required>
                        </div>
                        <textarea rows="4" class="w-full px-5 py-4 rounded-xl bg-stone-50 border border-stone-200 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-bold" placeholder="写下你的想法..." required></textarea>
                        <button type="submit" class="w-full py-4 bg-stone-900 text-white font-bold rounded-xl shadow-lg hover:bg-blue-600 hover:shadow-blue-500/30 hover:-translate-y-1 transition-all">发送消息</button>
                    </form>
                </div>
            `;
            document.getElementById('footer').innerHTML = `
                <div class="container mx-auto px-4">
                    <div class="flex flex-col md:flex-row justify-between items-center">
                        <div class="mb-4 md:mb-0">
                            <h5 class="text-white font-bold text-lg mb-1">${CONFIG.siteName}</h5>
                            <p class="opacity-50">© 2026 All rights reserved.</p>
                        </div>
                        <div class="flex gap-6">
                            <a href="#" class="hover:text-white transition-colors">隐私政策</a>
                            <a href="#" class="hover:text-white transition-colors">联系支持</a>
                        </div>
                    </div>
                </div>
            `;
        }

        function initChart() {
            const ctx = document.getElementById('impactChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['成员', '项目', '奖项'],
                    datasets: [{
                        data: CONFIG.about.chartData,
                        backgroundColor: ['#2563eb', '#7c3aed', '#f59e0b'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } } } }
            });
        }

        // --- DeepSeek API ---
        async function callDeepSeek(prompt, outputId) {
            const outputDiv = document.getElementById(outputId);
            outputDiv.classList.remove('hidden');
            outputDiv.innerHTML = '<div class="text-indigo-600 font-medium animate-pulse">DeepSeek R1 正在深度思考...</div>';

            if (!DEEPSEEK_API_KEY) {
                outputDiv.innerHTML = '<div class="text-red-500">❌ 请在代码顶部配置 DEEPSEEK_API_KEY</div>';
                return;
            }

            try {
                const response = await fetch("https://api.deepseek.com/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${DEEPSEEK_API_KEY}` },
                    body: JSON.stringify({ model: "deepseek-chat", messages: [{ role: "system", content: "你是一个高中科创社团的专家导师。" }, { role: "user", content: prompt }] })
                });
                if (!response.ok) throw new Error(`API Error: ${response.status}`);
                const data = await response.json();
                outputDiv.innerHTML = marked.parse(data.choices[0].message.content);
            } catch (err) {
                console.error(err);
                outputDiv.innerHTML = `<div class="text-red-500">API Error: ${err.message}</div>`;
            }
        }

        function generateProjectIdea() {
            const topic = document.getElementById('idea-topic').value;
            const level = document.getElementById('idea-level').value;
            if(!topic) return alert("请输入关键词");
            callDeepSeek(`设计一个创意项目。关键词：${topic}，难度：${level}。输出Markdown格式：名称、简介、硬件清单、功能。`, 'idea-result');
        }

        function askScienceTutor() {
            const q = document.getElementById('tutor-question').value;
            if(!q) return alert("请输入问题");
            callDeepSeek(`通俗解释：${q}`, 'tutor-result');
        }

        // 通用模态框逻辑
        const modalOverlay = document.getElementById('modal-overlay');
        const modalContent = document.getElementById('modal-content');
        function openModal(type) {
            modalOverlay.classList.remove('hidden');
            setTimeout(() => { modalOverlay.classList.remove('opacity-0'); modalContent.classList.remove('scale-95'); }, 10);
            if(type === 'shop-modal') modalContent.innerHTML = `<div class="p-8 text-center"><h3 class="text-2xl font-bold mb-4">周边购买指南</h3><p class="text-stone-600 mb-6">请前往社团活动室（图书馆302）或在开放日摊位购买。</p><button onclick="closeModal()" class="px-6 py-2 bg-stone-100 font-bold rounded-lg hover:bg-stone-200">关闭</button></div>`;
        }
        function openProjectModal(id) {
            const p = CONFIG.projects.find(x => x.id === id);
            openModal();
            modalContent.innerHTML = `
                <div class="relative">
                    <img src="${p.img}" class="w-full h-72 object-cover rounded-t-2xl">
                    <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 text-white w-8 h-8 rounded-full flex items-center justify-center hover:bg-black/70 backdrop-blur">✕</button>
                    <div class="p-8">
                        <span class="px-3 py-1 bg-blue-50 text-blue-700 text-xs font-bold rounded-full mb-4 inline-block border border-blue-100">${p.tags.join(' & ')}</span>
                        <h2 class="text-3xl font-bold text-stone-900 mb-4">${p.title}</h2>
                        <div class="prose text-stone-600 mb-8 leading-relaxed"><p>${p.detail}</p></div>
                        <div class="flex gap-4">
                            <button class="flex-1 py-3 bg-stone-900 text-white font-bold rounded-xl shadow-lg hover:scale-[1.02] transition-transform">下载项目文档</button>
                            <button class="flex-1 py-3 border border-stone-200 text-stone-700 font-bold rounded-xl hover:bg-stone-50">观看演示视频</button>
                        </div>
                    </div>
                </div>
            `;
        }
        function closeModal() {
            modalOverlay.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(() => { modalOverlay.classList.add('hidden'); modalContent.innerHTML = ''; }, 300);
        }
        function openAiModal() { openModal(); modalContent.innerHTML = document.getElementById('ai-modal-template').innerHTML; }
        function switchAiTab(t) {
            ['idea', 'tutor'].forEach(x => {
                document.getElementById(`ai-tab-${x}`).className = x===t ? "flex-1 py-4 text-sm font-bold text-indigo-700 border-b-2 border-indigo-600 bg-indigo-50/50 transition-colors" : "flex-1 py-4 text-sm font-medium text-stone-500 hover:text-stone-700 transition-colors";
                document.getElementById(`ai-view-${x}`).className = x===t ? "space-y-6" : "hidden space-y-6";
            });
        }
        function observeSections() {
            const observer = new IntersectionObserver(e => e.forEach(x => { if(x.isIntersecting) x.target.classList.add('is-visible') }), {threshold:0.1});
            document.querySelectorAll('.fade-in-section').forEach(el => observer.observe(el));
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            renderNav(); renderHero(); renderAbout(); renderProjects(); renderSchedule(); renderEvents(); renderMembers(); renderShop(); renderContactAndFooter(); initChart(); observeSections();
            // 默认选中第一个 Tab
            switchScheduleTab('practice');
        });
        document.getElementById('mobile-menu-btn').addEventListener('click', () => document.getElementById('mobile-menu').classList.toggle('hidden'));
    </script>
</body>
</html>
