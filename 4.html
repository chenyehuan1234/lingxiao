            filter: blur(8px);
            opacity: 0;
            transition: opacity 0.4s ease;

        .member-card:hover .member-avatar-glow { opacity: 0.6; }

        .timeline-line::before {
            content: ''; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px;
            background: linear-gradient(to bottom, transparent, #cbd5e1 10%, #cbd5e1 90%, transparent);

            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: currentColor;
            margin-left: 2px;
            vertical-align: bottom;
            animation: blink 1s step-end infinite;

            left: 0;
            width: 12px;
            height: 100vh;
            z-index: 9999;

            height: 0%;

        function initParticles() {
            const canvas = document.getElementById('hero-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            function resize() { width = canvas.width = window.innerWidth; height = canvas.height = document.getElementById('home').offsetHeight; }
            class Particle {
                constructor() { this.x = Math.random() * width; this.y = Math.random() * height; this.vx = (Math.random() - 0.5) * 1.5; this.vy = (Math.random() - 0.5) * 1.5; this.size = Math.random() * 2 + 1; }
                update() { this.x += this.vx; this.y += this.vy; if (this.x < 0 || this.x > width) this.vx *= -1; if (this.y < 0 || this.y > height) this.vy *= -1; }
                draw() { ctx.fillStyle = document.documentElement.classList.contains('dark') ? 'rgba(255,255,255,0.5)' : 'rgba(79, 70, 229, 0.5)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
            }
            function init() { particles = []; for (let i = 0; i < 60; i++) particles.push(new Particle()); }
            function animate() {
                ctx.clearRect(0, 0, width, height);
                const maxDist = 150;
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update(); particles[i].draw();
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x; const dy = particles[i].y - particles[j].y; const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < maxDist) { ctx.beginPath(); const opacity = 1 - dist/maxDist; ctx.strokeStyle = document.documentElement.classList.contains('dark') ? `rgba(255,255,255,${opacity * 0.2})` : `rgba(79, 70, 229,${opacity * 0.2})`; ctx.lineWidth = 1; ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke(); }
                    }
                }
                if(mouse.x !== null) {
                     for (let i = 0; i < particles.length; i++) {
                        const dx = particles[i].x - mouse.x; const dy = particles[i].y - mouse.y; const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 200) { ctx.beginPath(); ctx.strokeStyle = document.documentElement.classList.contains('dark') ? `rgba(255,255,255,0.1)` : `rgba(79, 70, 229,0.1)`; ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke(); }
                     }
                }
                requestAnimationFrame(animate);
            }
            const mouse = { x: null, y: null };
            window.addEventListener('mousemove', e => { const rect = canvas.getBoundingClientRect(); mouse.x = e.clientX - rect.left; mouse.y = e.clientY - rect.top; });
            window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });
            window.addEventListener('resize', () => { resize(); init(); });
            resize(); init(); animate();
        }

        function initTypewriter(texts) {
            const el = document.getElementById('typewriter-text');
            let textIndex = 0; let charIndex = 0; let isDeleting = false; let typeSpeed = 100;
            function type() {
                const currentText = texts[textIndex];
                if (isDeleting) { el.textContent = currentText.substring(0, charIndex - 1); charIndex--; typeSpeed = 50; } else { el.textContent = currentText.substring(0, charIndex + 1); charIndex++; typeSpeed = 100; }
                if (!isDeleting && charIndex === currentText.length) { isDeleting = true; typeSpeed = 2000; } else if (isDeleting && charIndex === 0) { isDeleting = false; textIndex = (textIndex + 1) % texts.length; typeSpeed = 500; }
                setTimeout(type, typeSpeed);
            }
            type();
        }

        // Scroll Progress
        const progressContainer = document.getElementById('progress-container');
        let isDraggingProgress = false;
        progressContainer.addEventListener('mousedown', (e) => { isDraggingProgress = true; handleProgressDrag(e); });
        window.addEventListener('mousemove', (e) => { if (isDraggingProgress) { e.preventDefault(); handleProgressDrag(e); } });
        window.addEventListener('mouseup', () => { isDraggingProgress = false; });
        function handleProgressDrag(e) {
            const windowHeight = window.innerHeight; const docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let percentage = e.clientY / windowHeight; if (percentage < 0) percentage = 0; if (percentage > 1) percentage = 1;
            window.scrollTo(0, percentage * docHeight);
        }
        window.addEventListener('scroll', () => {
            const progressBar = document.getElementById('scroll-progress');
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            progressBar.style.height = (winScroll / height) * 100 + "%";
        });

        // AI API
        async function callDeepSeek(prompt, outputId) {
            const outputDiv = document.getElementById(outputId);
            outputDiv.classList.remove('hidden');
            outputDiv.innerHTML = '<div class="text-indigo-600 font-medium animate-pulse">DeepSeek R1 正在深度思考...</div>';
            if (!DEEPSEEK_API_KEY) { outputDiv.innerHTML = '<div class="text-red-500">❌ 请在代码顶部配置 DEEPSEEK_API_KEY</div>'; return; }
            try {
                const response = await fetch("https://api.deepseek.com/chat/completions", {
                    method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${DEEPSEEK_API_KEY}` },
                    body: JSON.stringify({ model: "deepseek-chat", messages: [{ role: "system", content: "你是一个高中科创社团的专家导师。" }, { role: "user", content: prompt }] })
                });
                if (!response.ok) throw new Error(`API Error: ${response.status}`);
                const data = await response.json();
                outputDiv.innerHTML = marked.parse(data.choices[0].message.content);
            } catch (err) { console.error(err); outputDiv.innerHTML = `<div class="text-red-500">API Error: ${err.message}</div>`; }
        }
        function generateProjectIdea() {
            const topic = document.getElementById('idea-topic').value; const level = document.getElementById('idea-level').value;
            if(!topic) return alert("请输入关键词");
            callDeepSeek(`设计一个创意项目。关键词：${topic}，难度：${level}。输出Markdown格式：名称、简介、硬件清单、功能。`, 'idea-result');
        }
        function askScienceTutor() {
            const q = document.getElementById('tutor-question').value; if(!q) return alert("请输入问题");
            callDeepSeek(`通俗解释：${q}`, 'tutor-result');
        }

        // [Task 3: Course Explain Logic]
        function explainCourse(courseName) {
            openAiModal();
            switchAiTab('tutor');
            const input = document.getElementById('tutor-question');
            input.value = `请详细介绍一下高中科创课程：“${courseName}”包括其学习目标、核心知识点和可能的实践项目。`;
            askScienceTutor();
        }

        // Modals
        const modalOverlay = document.getElementById('modal-overlay');
        const modalContent = document.getElementById('modal-content');
        function openModal() {
            modalOverlay.classList.remove('hidden');
            setTimeout(() => { modalOverlay.classList.remove('opacity-0'); modalContent.classList.remove('scale-95'); }, 10);
        }
        function closeModal() {
            modalOverlay.classList.add('opacity-0'); modalContent.classList.add('scale-95');
            setTimeout(() => { modalOverlay.classList.add('hidden'); modalContent.innerHTML = ''; }, 300);
        }

        function openProjectModal(id) {
            const p = CONFIG.projects.find(x => x.id === id);
            openModal();
            modalContent.innerHTML = `
                <div class="relative">
                    <img src="${p.img}" class="w-full h-72 object-cover rounded-t-2xl">
                    <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 text-white w-8 h-8 rounded-full flex items-center justify-center hover:bg-black/70 backdrop-blur">✕</button>
                    <div class="p-8">
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${p.tags.map(t => `<span class="px-3 py-1 bg-blue-50 text-blue-700 text-xs font-bold rounded-full border border-blue-100">${t}</span>`).join('')}
                            ${p.awards ? `<span class="px-3 py-1 bg-yellow-50 text-yellow-700 text-xs font-bold rounded-full border border-yellow-100">🏆 ${p.awards}</span>` : ''}
                        </div>
                        <h2 class="text-3xl font-bold text-stone-900 dark:text-white mb-4">${p.title}</h2>
                        
                        <div class="grid md:grid-cols-2 gap-6 mb-8 text-sm">
                            <div class="space-y-4">
                                <div><strong class="text-stone-900 dark:text-white block mb-1">项目简介</strong><p class="text-stone-500 dark:text-stone-400 leading-relaxed">${p.detail}</p></div>
                                <div><strong class="text-stone-900 dark:text-white block mb-1">技术栈</strong><p class="text-stone-500 dark:text-stone-400 font-mono text-xs bg-stone-100 dark:bg-stone-800 p-2 rounded">${p.tech || '暂无数据'}</p></div>
                            </div>
                            <div class="space-y-4">
                                <div class="flex justify-between border-b border-stone-100 dark:border-stone-700 pb-2">
                                    <span class="text-stone-500">制作成员</span>
                                    <span class="font-bold text-stone-900 dark:text-white">${p.team || 'Unknown'}</span>
                                </div>
                                <div class="flex justify-between border-b border-stone-100 dark:border-stone-700 pb-2">
                                    <span class="text-stone-500">开发周期</span>
                                    <span class="font-bold text-stone-900 dark:text-white">${p.duration || 'Unknown'}</span>
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-col gap-4">
                            ${p.files ? (typeof p.files === 'string' ? `<a href="${p.files}" target="_blank" class="flex-1 py-3 bg-stone-900 dark:bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:scale-[1.02] transition-transform text-center">📂 下载项目文档</a>` : `<button class="flex-1 py-3 bg-stone-900 dark:bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:scale-[1.02] transition-transform">📂 下载相关文件</button>`) : ''}
                            ${p.video ? `<div class="w-full bg-black rounded-xl overflow-hidden mt-4"><video controls class="w-full h-auto" src="${p.video}"></video></div>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }
        
        function openMemberModal(index) {
            const m = CONFIG.members.current[index];
            openModal();
            modalContent.innerHTML = `
                <div class="p-8 text-center relative">
                     <button onclick="closeModal()" class="absolute top-4 right-4 text-stone-400 hover:text-stone-900 dark:hover:text-white w-8 h-8 font-bold text-xl">×</button>
                    <div class="w-32 h-32 mx-auto rounded-full p-1 bg-gradient-to-r ${m.color} mb-6">
                        <img src="${m.detailImg}" class="w-full h-full object-cover rounded-full border-4 border-white dark:border-stone-800">
                    </div>
                    <h2 class="text-3xl font-bold text-stone-900 dark:text-white mb-2">${m.name}</h2>
                    <span class="inline-block px-3 py-1 rounded-full bg-stone-100 dark:bg-stone-800 text-stone-500 text-xs font-bold uppercase tracking-widest mb-6">${m.role}</span>
                    <p class="text-stone-600 dark:text-stone-300 leading-relaxed italic max-w-md mx-auto relative mb-6">
                        <span class="text-4xl text-stone-200 absolute -top-4 -left-4">“</span>
                        ${m.intro}
                        <span class="text-4xl text-stone-200 absolute -bottom-4 -right-4">”</span>
                    </p>
                    ${m.wechat ? `<div class="bg-stone-50 dark:bg-stone-800 p-4 rounded-xl inline-block">
                        <p class="text-xs font-bold text-stone-500 uppercase mb-2">添加微信</p>
                        ${m.qr ? `<img src="${m.qr}" class="w-32 h-32 object-cover rounded-lg mb-2 mx-auto">` : ''}
                        <p class="font-mono text-sm text-stone-800 dark:text-white select-all">${m.wechat}</p>
                    </div>` : ''}
                </div>
            `;
        }

        function openAiModal() { openModal(); modalContent.innerHTML = document.getElementById('ai-modal-template').innerHTML; }
        function switchAiTab(t) {
            ['idea', 'tutor'].forEach(x => {
                document.getElementById(`ai-tab-${x}`).className = x===t ? "flex-1 py-4 text-sm font-bold text-indigo-700 border-b-2 border-indigo-600 bg-indigo-50/50 transition-colors" : "flex-1 py-4 text-sm font-medium text-stone-500 hover:text-stone-700 transition-colors";
                document.getElementById(`ai-view-${x}`).className = x===t ? "space-y-6" : "hidden space-y-6";
            });
        }
        function observeSections() {
            const observer = new IntersectionObserver(e => e.forEach(x => { if(x.isIntersecting) x.target.classList.add('is-visible') }), {threshold:0.1});
            document.querySelectorAll('.fade-in-section').forEach(el => observer.observe(el));
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
            renderNav(); renderHero(); renderAbout(); renderProjects(); renderSchedule(); renderEvents(); renderMembers(); renderShop(); renderContactAndFooter(); initChart(); observeSections();
            switchScheduleTab('practice');
        });
        document.getElementById('mobile-menu-btn').addEventListener('click', () => document.getElementById('mobile-menu').classList.toggle('hidden'));
    </script>
</body>
</html>
